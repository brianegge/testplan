name: Sync strict with upstream main

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: strict
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/morganstanley/testplan.git
          git fetch upstream main

      - name: Merge upstream/main
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push if no conflict
        if: steps.merge.outputs.conflict == 'false'
        run: git push origin strict

      - name: Open issue on conflict
        if: steps.merge.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sync-conflict',
              state: 'open',
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Merge conflict: upstream main → strict',
                body: 'The automatic sync of upstream `main` into `strict` hit a merge conflict.\n\nRun the scheduled Claude Code trigger to resolve it, or resolve manually.',
                labels: ['sync-conflict'],
              });
            }
